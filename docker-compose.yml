services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: readyabc
      POSTGRES_PASSWORD: readyabc
      POSTGRES_DB: readyabc
    ports:
      - "5432:5432"
    volumes:
      - readyabc_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "readyabc"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://readyabc:readyabc@db:5432/readyabc
      JWT_SECRET: change-me-in-production
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node prisma/seed.js && node src/server.js"

volumes:
  readyabc_db:
