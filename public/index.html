<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReadyABC — Reading is fun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <!-- Header (only when authenticated) -->
  <header id="topbar" class="topbar hidden">
    <div class="brand" data-route="/dashboard">
      <span class="brand-mark">📖</span>
      <span class="brand-name">ReadyABC</span>
    </div>
    <div class="topbar-right">
      <span id="parent-name" class="parent-name"></span>
      <button id="logout-btn" class="btn btn-ghost">Log out</button>
    </div>
  </header>

  <main id="app"></main>

  <!-- Confetti / celebration layer -->
  <div id="celebrate-layer" class="celebrate-layer" aria-hidden="true"></div>

  <script src="/js/api.js"></script>
  <script src="/js/views.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
